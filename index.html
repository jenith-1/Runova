<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Runova</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:manipulation}
html,body{width:100%;height:100%;overflow:hidden;background:#06060f;font-family:'Nunito',sans-serif}
canvas{
  position:fixed;top:0;left:0;width:100%;height:100%;display:block;
  image-rendering:-webkit-optimize-contrast;
  image-rendering:crisp-edges;
  -ms-interpolation-mode:nearest-neighbor;
}
/* Name entry overlay */
#nameOverlay{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(6,6,15,0.88);backdrop-filter:blur(6px);
  z-index:10;flex-direction:column;gap:0;
  transition:opacity 0.25s ease;
}
#nameOverlay.hidden{opacity:0;pointer-events:none;}
#nameBox{
  background:rgba(20,16,48,0.98);
  border:1.5px solid rgba(108,99,255,0.55);
  border-radius:24px;
  padding:36px 28px 28px;
  display:flex;flex-direction:column;align-items:center;gap:16px;
  width:min(340px,88vw);
  box-shadow:0 8px 40px rgba(108,99,255,0.25);
}
#nameEmoji{font-size:52px;line-height:1;margin-bottom:4px;}
#nameTitle{
  font-family:'Nunito',sans-serif;font-weight:900;font-size:22px;
  color:#fff;text-align:center;letter-spacing:0.3px;
}
#nameSub{
  font-family:'Nunito',sans-serif;font-weight:600;font-size:13px;
  color:rgba(255,255,255,0.5);text-align:center;margin-top:-8px;
}
#nameInput{
  width:100%;padding:14px 18px;border-radius:14px;border:1.5px solid rgba(108,99,255,0.4);
  background:rgba(255,255,255,0.07);color:#fff;
  font-family:'Nunito',sans-serif;font-size:18px;font-weight:700;
  outline:none;text-align:center;letter-spacing:0.5px;
  transition:border-color 0.2s;
  -webkit-appearance:none;
}
#nameInput::placeholder{color:rgba(255,255,255,0.25);}
#nameInput:focus{border-color:rgba(108,99,255,0.8);}
#nameConfirm{
  width:100%;padding:15px;border-radius:14px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#6C63FF,#9B8FFF);
  color:#fff;font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;
  letter-spacing:0.3px;box-shadow:0 4px 20px rgba(108,99,255,0.4);
  transition:transform 0.1s,box-shadow 0.1s;
  -webkit-appearance:none;
}
#nameConfirm:active{transform:scale(0.97);box-shadow:0 2px 12px rgba(108,99,255,0.3);}
/* Streak reward popup */
#streakPopup{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(6,6,15,0.85);backdrop-filter:blur(8px);
  z-index:20;
  transition:opacity 0.3s ease;
}
#streakPopup.hidden{opacity:0;pointer-events:none;}
#streakBox{
  background:rgba(16,10,44,0.98);
  border:2px solid rgba(255,208,96,0.5);
  border-radius:28px;
  padding:36px 28px 28px;
  display:flex;flex-direction:column;align-items:center;gap:14px;
  width:min(330px,86vw);
  box-shadow:0 8px 48px rgba(255,208,96,0.2),0 2px 16px rgba(0,0,0,0.5);
}
#streakIcon{font-size:60px;line-height:1;}
#streakTitle{
  font-family:'Nunito',sans-serif;font-weight:900;font-size:24px;
  color:#FFD060;text-align:center;
}
#streakMsg{
  font-family:'Nunito',sans-serif;font-weight:700;font-size:15px;
  color:rgba(255,255,255,0.7);text-align:center;line-height:1.5;
}
#streakReward{
  background:rgba(255,208,96,0.12);
  border:1.5px solid rgba(255,208,96,0.4);
  border-radius:16px;padding:12px 24px;
  font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;
  color:#FFD060;text-align:center;width:100%;
}
#streakClaim{
  width:100%;padding:15px;border-radius:16px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#F7971E,#FFD060);
  color:#1a0a00;font-family:'Nunito',sans-serif;font-size:17px;font-weight:900;
  box-shadow:0 4px 20px rgba(247,151,30,0.45);
  -webkit-appearance:none;transition:transform 0.1s;
}
#streakClaim:active{transform:scale(0.97);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="streakPopup" class="hidden">
  <div id="streakBox">
    <div id="streakIcon">🔥</div>
    <div id="streakTitle">Streak Milestone!</div>
    <div id="streakMsg" id="streakMsg"></div>
    <div id="streakReward"></div>
    <button id="streakClaim">Claim Reward</button>
  </div>
</div>
<div id="nameOverlay" class="hidden">
  <div id="nameBox">
    <div id="nameEmoji">🏎️</div>
    <div id="nameTitle">What's your name?</div>
    <div id="nameSub">This will appear on your home screen</div>
    <input id="nameInput" type="text" maxlength="16" placeholder="Enter name…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button id="nameConfirm">Let's Race!</button>
  </div>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d',{alpha:false});
const GW=390,GH=844;
// 2x internal render scale * native DPR = sharp on every screen including 4K
const RSCALE=2;
let DPR=1,SC=1,OX=0,OY=0;

function resize(){
  DPR=window.devicePixelRatio||1;
  const sw=innerWidth,sh=innerHeight;
  C.width =Math.round(sw*DPR*RSCALE);
  C.height=Math.round(sh*DPR*RSCALE);
  C.style.width =sw+'px';
  C.style.height=sh+'px';
  SC=Math.min(sw/GW,sh/GH);
  OX=(sw-GW*SC)/2; OY=(sh-GH*SC)/2;
  // Must re-apply after every canvas resize — resize resets ctx state
  X.imageSmoothingEnabled=true;
  X.imageSmoothingQuality='high';
}
resize();
addEventListener('resize',resize);
addEventListener('orientationchange',()=>setTimeout(resize,150));

function toG(ex,ey){
  const r=C.getBoundingClientRect();
  return{x:(ex-r.left-OX)/SC,y:(ey-r.top-OY)/SC};
}

const P={
  bg0:'#06060f',bg1:'#0e0e20',
  panel:'rgba(255,255,255,0.07)',
  panelBorder:'rgba(255,255,255,0.11)',
  white:'#fff',
  textPrimary:'#fff',
  textSecondary:'rgba(255,255,255,0.55)',
  textMuted:'rgba(255,255,255,0.3)',
  accent:'#6C63FF',accentB:'#FF6584',accentC:'#43E97B',accentD:'#F7971E',
  gold:'#FFD060',red:'#FF4757',
  road:'#12122a',roadLine:'rgba(255,255,255,0.13)',
  grass0:'#0a1f0a',
};

/* ═══════════════════════════════════════════════════════════
   RUNOVA — Complete Local Storage System
   All progress saved automatically. Never lost on refresh.
   ═══════════════════════════════════════════════════════════ */

// Default values — used on very first launch
const DEFAULTS = {
  name:       '',
  coins:      50,
  owned:      [0],
  car:        0,
  music:      true,
  sfx:        true,
  diff:       'medium',
  daily:      '',
  dailyday:   0,
  streak:     0,
  slast:      '',
  sclaimed:   [],
  races:      0,
  wins:       0,
  bestscore:  0,
};

// Safe localStorage helpers — never crash if storage is blocked
function lsGet(key, fallback){
  try{
    const v = localStorage.getItem('rv_'+key);
    if(v === null) return fallback;
    return v;
  }catch(e){ return fallback; }
}
function lsSet(key, val){
  try{ localStorage.setItem('rv_'+key, val); }catch(e){}
}
function lsGetJSON(key, fallback){
  try{
    const v = localStorage.getItem('rv_'+key);
    if(v === null) return fallback;
    return JSON.parse(v);
  }catch(e){ return fallback; }
}

// ── Load all state from localStorage (with safe defaults) ──
let playerName   = lsGet('name',    DEFAULTS.name);
let coins        = parseInt(lsGet('coins', DEFAULTS.coins)) || DEFAULTS.coins;
let owned        = lsGetJSON('owned',    DEFAULTS.owned);
let active       = parseInt(lsGet('car', DEFAULTS.car))   || DEFAULTS.car;
let musicOn      = lsGet('music',  DEFAULTS.music?'1':'0') !== '0';
let sfxOn        = lsGet('sfx',    DEFAULTS.sfx?'1':'0')   !== '0';
let difficulty   = lsGet('diff',   DEFAULTS.diff);
let lastDay      = lsGet('daily',  DEFAULTS.daily);
let dayIdx       = parseInt(lsGet('dailyday', DEFAULTS.dailyday)) || 0;
let streakCount  = parseInt(lsGet('streak',   DEFAULTS.streak))   || 0;
let streakLastDay= lsGet('slast',  DEFAULTS.slast);
let streakClaimed= lsGetJSON('sclaimed', DEFAULTS.sclaimed);
let totalRaces   = parseInt(lsGet('races',     DEFAULTS.races))     || 0;
let totalWins    = parseInt(lsGet('wins',      DEFAULTS.wins))      || 0;
let bestScore    = parseInt(lsGet('bestscore', DEFAULTS.bestscore)) || 0;

// Validate owned array — ensure it's valid and contains 0
if(!Array.isArray(owned) || owned.length===0) owned=[0];
// Validate active car index
if(active<0 || active>=6 || !owned.includes(active)) active=owned[0]||0;
// Validate difficulty
if(!['easy','medium','hard'].includes(difficulty)) difficulty='medium';
// Validate coins
if(isNaN(coins)||coins<0) coins=DEFAULTS.coins;

// ── Save ALL state to localStorage ──
function save(){
  lsSet('name',      playerName);
  lsSet('coins',     coins);
  lsSet('owned',     JSON.stringify(owned));
  lsSet('car',       active);
  lsSet('music',     musicOn?'1':'0');
  lsSet('sfx',       sfxOn?'1':'0');
  lsSet('diff',      difficulty);
  lsSet('daily',     lastDay);
  lsSet('dailyday',  dayIdx);
  lsSet('streak',    streakCount);
  lsSet('slast',     streakLastDay);
  lsSet('sclaimed',  JSON.stringify(streakClaimed));
  lsSet('races',     totalRaces);
  lsSet('wins',      totalWins);
  lsSet('bestscore', bestScore);
}

let screen='home';
let fadeAlpha=0, fadeDir=0, fadeTarget='', fadeSpeed=0.06;

function goto(s){
  // Instant for race→result (dramatic pause handles it)
  if(screen==='race'||s==='race'){screen=s;clearBtns();fadeAlpha=0;return;}
  fadeTarget=s; fadeDir=1; // fade out then switch
}
function updateFade(){
  if(fadeDir===1){
    fadeAlpha=Math.min(1,fadeAlpha+fadeSpeed);
    if(fadeAlpha>=1){screen=fadeTarget;clearBtns();fadeDir=-1;}
  } else if(fadeDir===-1){
    fadeAlpha=Math.max(0,fadeAlpha-fadeSpeed);
    if(fadeAlpha<=0) fadeDir=0;
  }
}
function drawFade(){
  if(fadeAlpha<=0)return;
  X.fillStyle=`rgba(6,6,15,${fadeAlpha})`;
  X.fillRect(0,0,GW,GH);
}

// ── Player name overlay ─────────────────────────────────────
const nameOverlay=document.getElementById('nameOverlay');
const nameInput=document.getElementById('nameInput');
const nameConfirm=document.getElementById('nameConfirm');

function showNamePrompt(onDone){
  nameInput.value='';
  nameOverlay.classList.remove('hidden');
  // Small delay so keyboard opens after animation
  setTimeout(()=>nameInput.focus(),120);
  function confirm(){
    const v=nameInput.value.trim();
    playerName=v.length>0?v:'Player';
    save();
    nameOverlay.classList.add('hidden');
    nameInput.blur();
    if(onDone) onDone();
  }
  nameConfirm.onclick=confirm;
  nameInput.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();confirm();}};
}

// First launch: show name prompt before home screen
if(!playerName){
  setTimeout(()=>showNamePrompt(null),200);
}

// ── Streak logic ────────────────────────────────────────────
const STREAK_MILESTONES={
  5: {coins:15, msg:'5 Day Streak!',    icon:'🔥', sub:'You came back 5 days in a row!'},
  10:{coins:30, msg:'10 Day Streak!',   icon:'⚡', sub:'10 days of racing — impressive!'},
  15:{coins:60, msg:'15 Day Streak!',   icon:'🏆', sub:'15 days! You are on fire!'},
  20:{coins:100,msg:'20 Day Streak!',   icon:'💎', sub:'20 days straight — legendary!'},
  30:{coins:0,  msg:'30 Day Streak!',   icon:'🚀', sub:'Unlock the rarest car — FREE!', carUnlock:true},
};

function updateStreak(){
  const today=new Date().toDateString();
  if(streakLastDay===today) return; // already counted today
  const yesterday=new Date(Date.now()-86400000).toDateString();
  if(streakLastDay===yesterday){
    streakCount++; // consecutive day
  } else if(streakLastDay!==''){
    streakCount=1; // streak broken — reset
  } else {
    streakCount=1; // first ever visit
  }
  streakLastDay=today;
  save();
  // Check for unclaimed milestone
  if(STREAK_MILESTONES[streakCount] && !streakClaimed.includes(streakCount)){
    setTimeout(()=>showStreakPopup(streakCount),600);
  }
}

const streakPopup=document.getElementById('streakPopup');
const streakIcon=document.getElementById('streakIcon');
const streakTitle=document.getElementById('streakTitle');
const streakMsg=document.getElementById('streakMsg');
const streakReward=document.getElementById('streakReward');
const streakClaim=document.getElementById('streakClaim');

function showStreakPopup(day){
  const m=STREAK_MILESTONES[day];
  if(!m) return;
  streakIcon.textContent=m.icon;
  streakTitle.textContent=m.msg;
  streakMsg.textContent=m.sub;
  if(m.carUnlock){
    // Find most expensive car not yet owned
    const expIdx=CAR_DEFS.reduce((best,car,i)=>car.price>CAR_DEFS[best].price?i:best,0);
    streakReward.textContent='🚗 '+CAR_DEFS[expIdx].name+' — UNLOCKED FREE!';
  } else {
    streakReward.textContent='+'+m.coins+' 🪙 Coins';
  }
  streakPopup.classList.remove('hidden');
  streakClaim.onclick=()=>{
    // Give reward
    if(m.carUnlock){
      const expIdx=CAR_DEFS.reduce((best,car,i)=>car.price>CAR_DEFS[best].price?i:best,0);
      if(!owned.includes(expIdx)) owned.push(expIdx);
    } else {
      coins+=m.coins;
    }
    streakClaimed.push(day);
    save();
    streakPopup.classList.add('hidden');
    if(sfxOn){ sfxWin(); setTimeout(sfxCoin,300); }
  };
}

// Run streak update on load
updateStreak();

let AC;
function audio(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
function tone(f,t,d,v=0.25,w='sine'){
  if(!sfxOn)return;
  try{const a=audio(),o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.type=w;
  o.frequency.setValueAtTime(f,a.currentTime+t);
  g.gain.setValueAtTime(v,a.currentTime+t);
  g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+t+d);
  o.start(a.currentTime+t);o.stop(a.currentTime+t+d);}catch(e){}
}
const sfxClick  =()=>{tone(900,0,0.04,0.10,'sine');tone(1200,0.02,0.03,0.06,'sine');};
const sfxCorrect=()=>{
  tone(523,0,0.06,0.18,'sine');tone(659,0.07,0.06,0.18,'sine');
  tone(784,0.14,0.08,0.18,'sine');tone(1047,0.22,0.12,0.16,'sine');
  tone(1319,0.32,0.14,0.12,'sine');
};
const sfxWrong=()=>{
  tone(180,0,0.06,0.2,'sawtooth');tone(150,0.07,0.10,0.18,'sawtooth');
  tone(120,0.17,0.15,0.14,'sawtooth');
};
const sfxCoin=()=>{
  tone(880,0,0.05,0.18,'sine');tone(1100,0.06,0.06,0.16,'sine');
  tone(1320,0.12,0.08,0.14,'sine');tone(1760,0.20,0.10,0.10,'sine');
};
const sfxWin=()=>{
  const mel=[523,659,784,1047,784,1047,1319,1047,1319,1568];
  mel.forEach((f,i)=>tone(f,i*0.08,0.12,0.18-(i*.01),'square'));
};

/* ══════════════════════════════════════════════════════════════
   RUNOVA BGM  —  Generative racing music engine
   4 layers: melody · bass · chords · percussion
   BPM 128, key C-major, 8-bar looping phrase
   ══════════════════════════════════════════════════════════════ */
let bgRunning=false, bgNodes=[], bgScheduleTimer=null;
let bgMasterGain=null, bgNextBeat=0, bgBeat=0;

const BPM=128, BEAT=60/BPM, BAR=BEAT*4;

// C-major scale freqs (one octave, two registers)
const NOTE={
  C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196.00,A3:220.00,B3:246.94,
  C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00,B4:493.88,
  C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880.00,B5:987.77,
  C6:1046.50,R:0
};

// 8-bar chord progression: C  G  Am  F  (×2)
const PROG=[
  {r:NOTE.C3,ch:[NOTE.C4,NOTE.E4,NOTE.G4]},
  {r:NOTE.G3,ch:[NOTE.G3,NOTE.B3,NOTE.D4]},
  {r:NOTE.A3,ch:[NOTE.A3,NOTE.C4,NOTE.E4]},
  {r:NOTE.F3,ch:[NOTE.F3,NOTE.A3,NOTE.C4]},
  {r:NOTE.C3,ch:[NOTE.C4,NOTE.E4,NOTE.G4]},
  {r:NOTE.G3,ch:[NOTE.G3,NOTE.B3,NOTE.D4]},
  {r:NOTE.A3,ch:[NOTE.A3,NOTE.C4,NOTE.E4]},
  {r:NOTE.F3,ch:[NOTE.F3,NOTE.A3,NOTE.C4]},
];

// Melody: 32 notes over 8 bars (4 notes per bar), R = rest
const MELODY=[
  NOTE.E5,NOTE.G5,NOTE.A5,NOTE.G5,
  NOTE.B5,NOTE.G5,NOTE.E5,NOTE.R,
  NOTE.A5,NOTE.A5,NOTE.G5,NOTE.E5,
  NOTE.F5,NOTE.E5,NOTE.D5,NOTE.R,
  NOTE.E5,NOTE.G5,NOTE.C6,NOTE.B5,
  NOTE.A5,NOTE.G5,NOTE.F5,NOTE.E5,
  NOTE.D5,NOTE.E5,NOTE.F5,NOTE.E5,
  NOTE.C5,NOTE.R, NOTE.C5,NOTE.R,
];

// Bassline pattern per bar: 4 steps (on the beat)
const BASS_RHYTHM=[1,0,1,0]; // which beats get a bass hit

// Hi-hat pattern: 8 steps per bar (every half-beat)
const HIHAT=[1,1,1,1,1,1,1,1];
// Kick pattern: 4 steps (quarter notes)
const KICK =[1,0,1,0];
// Snare on beats 2 & 4
const SNARE=[0,1,0,1];

function makeBGMNodes(a){
  const master=a.createGain();
  master.gain.value=0.0;
  const comp=a.createDynamicsCompressor();
  comp.threshold.value=-18;comp.ratio.value=4;
  master.connect(comp);comp.connect(a.destination);
  bgMasterGain=master;
  // Fade in
  master.gain.setValueAtTime(0,a.currentTime);
  master.gain.linearRampToValueAtTime(0.55,a.currentTime+1.5);
}

function schedNote(a,freq,startT,dur,type,vol,attack=0.01,release=null){
  if(!freq||freq===NOTE.R) return;
  const o=a.createOscillator(), g=a.createGain();
  o.connect(g); g.connect(bgMasterGain);
  o.type=type; o.frequency.value=freq;
  const rel=release||dur*0.7;
  g.gain.setValueAtTime(0,startT);
  g.gain.linearRampToValueAtTime(vol,startT+attack);
  g.gain.setValueAtTime(vol,startT+dur-rel);
  g.gain.exponentialRampToValueAtTime(0.0001,startT+dur);
  o.start(startT); o.stop(startT+dur+0.01);
  bgNodes.push(o,g);
}

function schedKick(a,t){
  // Sub-bass thump
  const o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(bgMasterGain);
  o.type='sine';
  o.frequency.setValueAtTime(150,t);
  o.frequency.exponentialRampToValueAtTime(40,t+0.12);
  g.gain.setValueAtTime(0.9,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
  o.start(t);o.stop(t+0.2);
  bgNodes.push(o,g);
}

function schedSnare(a,t){
  // White-noise snare via buffer
  try{
    const buf=a.createBuffer(1,a.sampleRate*0.12,a.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*0.6;
    const src=a.createBufferSource(),g=a.createGain(),filt=a.createBiquadFilter();
    src.buffer=buf;filt.type='highpass';filt.frequency.value=2200;
    src.connect(filt);filt.connect(g);g.connect(bgMasterGain);
    g.gain.setValueAtTime(0.55,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    src.start(t);src.stop(t+0.13);
    bgNodes.push(src,g,filt);
  }catch(e){}
}

function schedHihat(a,t,open=false){
  try{
    const buf=a.createBuffer(1,a.sampleRate*(open?0.1:0.04),a.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1);
    const src=a.createBufferSource(),g=a.createGain(),filt=a.createBiquadFilter();
    src.buffer=buf;filt.type='highpass';filt.frequency.value=8000;
    src.connect(filt);filt.connect(g);g.connect(bgMasterGain);
    g.gain.setValueAtTime(open?0.22:0.14,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+(open?0.09:0.035));
    src.start(t);
    bgNodes.push(src,g,filt);
  }catch(e){}
}

function schedBar(a, barIndex, barStart){
  const prog=PROG[barIndex%PROG.length];

  for(let beat=0;beat<4;beat++){
    const beatT=barStart+beat*BEAT;

    // ── Melody (16th note timing within beat)
    const melIdx=(barIndex%8)*4+beat;
    const melNote=MELODY[melIdx];
    schedNote(a,melNote,beatT,BEAT*0.85,'square',0.13,0.005,0.06);

    // ── Bass: root on beats 1 & 3
    if(BASS_RHYTHM[beat%4]){
      schedNote(a,prog.r,beatT,BEAT*0.7,'triangle',0.28,0.01,0.08);
      // octave below for depth
      schedNote(a,prog.r*0.5,beatT,BEAT*0.6,'sine',0.18,0.01,0.1);
    }

    // ── Chord pad: whole-bar pads on beat 1 only
    if(beat===0){
      prog.ch.forEach((f,ci)=>{
        schedNote(a,f,beatT,BAR*0.95,'sine',0.055+ci*0.005,0.06,0.5);
      });
    }

    // ── Percussion
    if(KICK[beat]) schedKick(a,beatT);
    if(SNARE[beat]) schedSnare(a,beatT);
    // Hi-hats: 2 per beat
    schedHihat(a,beatT,false);
    schedHihat(a,beatT+BEAT*0.5,beat===3); // open hat on last half-beat of bar

    // Extra melody fill on off-beat (8th note)
    const fillIdx=((barIndex%8)*4+beat+1)%MELODY.length;
    const fillNote=MELODY[fillIdx];
    if(fillNote&&fillNote!==NOTE.R&&beat<3){
      schedNote(a,fillNote,beatT+BEAT*0.5,BEAT*0.4,'square',0.07,0.003,0.04);
    }
  }
}

function bgScheduleLoop(){
  if(!bgRunning||!musicOn){stopBGM();return;}
  try{
    const a=audio();
    if(!bgMasterGain) makeBGMNodes(a);
    // Schedule 2 bars ahead, every 1 bar
    const schedAhead=BAR*2;
    const now=a.currentTime;
    while(bgNextBeat<now+schedAhead){
      schedBar(a,bgBeat,bgNextBeat);
      bgNextBeat+=BAR;
      bgBeat=(bgBeat+1)%8;
    }
  }catch(e){}
}

function startBGM(){
  if(!musicOn||bgRunning)return;
  bgRunning=true;bgBeat=0;bgNodes=[];
  try{
    const a=audio();
    bgNextBeat=a.currentTime+0.1;
    makeBGMNodes(a);
    bgScheduleLoop();
    bgScheduleTimer=setInterval(bgScheduleLoop,BAR*1000*0.9);
  }catch(e){}
}

function stopBGM(){
  bgRunning=false;
  if(bgScheduleTimer){clearInterval(bgScheduleTimer);bgScheduleTimer=null;}
  try{
    if(bgMasterGain){
      const a=audio();
      bgMasterGain.gain.setValueAtTime(bgMasterGain.gain.value,a.currentTime);
      bgMasterGain.gain.linearRampToValueAtTime(0,a.currentTime+0.4);
      setTimeout(()=>{
        bgNodes.forEach(n=>{try{n.disconnect();}catch(e){}});
        bgNodes=[];bgMasterGain=null;
      },500);
    }
  }catch(e){bgNodes=[];bgMasterGain=null;}
}

// difficulty loaded from localStorage above
function makeQ(d){
  let a,b,ans,op;

  if(d==='easy'){
    // Young children only: tiny numbers, + and - only
    // Addition: both 1-6, result max 10
    // Subtraction: small result, never negative
    op=Math.random()<0.6?'+':'-';
    if(op==='+'){
      a=rn(1,6); b=rn(1,6);
      ans=a+b;
    } else {
      // Ensure result is 1-5 (never 0, never confusing)
      ans=rn(1,5); b=rn(1,4); a=ans+b;
    }
    // Wrong answers differ by ±1 or ±2 only — tricky but readable
    let w1=ans+(Math.random()<.5?1:-1);
    let w2=ans+(Math.random()<.5?2:-2);
    if(w1<=0)w1=ans+1;
    if(w2<=0)w2=ans+2;
    if(w1===ans)w1=ans+1;
    if(w2===ans||w2===w1){w2=ans-1;if(w2<=0)w2=ans+3;}
    return{text:`${a} ${op} ${b} =`,ans,choices:shuf([ans,w1,w2])};
  }

  if(d==='medium'){
    const ops=['+','-','*'];
    op=ops[~~(Math.random()*ops.length)];
    if(op==='+'){a=rn(5,50);b=rn(5,50);ans=a+b;}
    else if(op==='-'){a=rn(10,99);b=rn(1,a);ans=a-b;}
    else{a=rn(2,9);b=rn(2,9);ans=a*b;}
  } else {
    // Hard: all ops, bigger numbers
    const ops=['+','-','*','/'];
    op=ops[~~(Math.random()*ops.length)];
    if(op==='+'){a=rn(10,99);b=rn(10,99);ans=a+b;}
    else if(op==='-'){a=rn(20,99);b=rn(1,a);ans=a-b;}
    else if(op==='*'){a=rn(3,12);b=rn(3,12);ans=a*b;}
    else{b=rn(2,12);ans=rn(2,12);a=b*ans;}
  }

  let w1=Math.max(1,ans+rn(1,6)*(Math.random()<.5?1:-1));
  let w2=Math.max(1,ans+rn(7,15)*(Math.random()<.5?1:-1));
  if(w1===ans)w1=ans+rn(1,4);
  if(w2===ans||w2===w1)w2=ans+rn(8,14);
  return{text:`${a} ${op} ${b} =`,ans,choices:shuf([ans,w1,w2])};
}
function rn(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shuf(a){return a.sort(()=>Math.random()-.5);}

const TRACK=3500,LANES_Y=[310,395,480];
let cars,question,qIdx,totalQ,particles,cfx,flashT,flashGood;
let answered,ansFlash,placesDone,aiTimers,raceOver,correctCount=0;
let resultPlace=1,resultEarned=0;
let gamePaused=false;
let camX=0; // smoothed camera position
const AI_RACE=[];

function initRace(){
  const ai1=(active+1)%6,ai2=(active+2)%6;
  AI_RACE[0]=AI_NAMES[rn(0,3)];AI_RACE[1]=AI_NAMES[rn(0,3)];
  if(AI_RACE[0]===AI_RACE[1])AI_RACE[1]=AI_NAMES[4];
  camX=50;
  cars=[
    {x:50,vx:0,lane:0,def:CAR_DEFS[active],player:true, fin:false,place:0,name:'You',  wheel:0,sx:1,sy:1,bounce:0,prevVx:0},
    {x:30,vx:0,lane:1,def:CAR_DEFS[ai1],   player:false,fin:false,place:0,name:AI_RACE[0],wheel:0,sx:1,sy:1,bounce:0,prevVx:0},
    {x:20,vx:0,lane:2,def:CAR_DEFS[ai2],   player:false,fin:false,place:0,name:AI_RACE[1],wheel:0,sx:1,sy:1,bounce:0,prevVx:0},
  ];
  totalQ=15;
  qIdx=0;particles=[];cfx=[];flashT=0;flashGood=false;
  answered=false;ansFlash=-1;placesDone=0;raceOver=false;
  correctCount=0;gamePaused=false;
  aiTimers=[rn(1600,2800),rn(2000,3200)];
  nextQ();startBGM();
}
let qAppearT=0;
function nextQ(){question=makeQ(difficulty);answered=false;ansFlash=-1;qAppearT=Date.now();}
function doAnswer(i){
  if(answered || raceOver || screen!=='race')return;
  answered=true;ansFlash=i;
  const ok=question.choices[i]===question.ans;
  if(ok){
    sfxCorrect();flashGood=true;flashT=420;correctCount++;
    const boost=rn(38,48);
    cars[0].vx=Math.min(cars[0].vx+boost,52);
    cars[0].sx=0.75;cars[0].sy=1.25; // hard squish on boost
    spawnP(pSX(),LANES_Y[0]);
    cfx.push({x:pSX(),y:LANES_Y[0]-40,life:1,txt:'+1'});
    // Speed line burst
    for(let sl=0;sl<8;sl++) particles.push({
      x:pSX()-rn(10,60),y:LANES_Y[0]-rn(-20,20),
      vx:-rn(8,18),vy:(Math.random()-.5)*2,
      r:1.5,life:0.7,color:'rgba(255,255,255,0.5)',isLine:true,len:rn(20,50)
    });
  }else{sfxWrong();flashGood=false;flashT=380;cars[0].vx=Math.max(cars[0].vx-rn(3,6),0);}
  qIdx++;
  // Always load next question if race is still running — even past totalQ
  // This prevents the freeze where the last question disappears but the
  // car hasn't crossed the finish line yet.
  if(!raceOver){
    setTimeout(()=>{ if(!raceOver && screen==='race') nextQ(); },550);
  }
}
function spawnP(x,y){
  const c=[P.gold,P.accentC,P.accent,'#00C9FF',P.accentB,P.accentD];
  for(let i=0;i<20;i++){const a=(Math.PI*2/20)*i+Math.random()*.5,s=rn(3,10);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,r:rn(3,6),life:1,color:c[i%c.length]});}
}
function camOff(){return camX;}
function toSX(wx){return 30+(wx-camX)*(GW*0.97/(TRACK*0.82));}
function pSX(){return toSX(cars[0].x);}
function getPlace(c){return[...cars].sort((a,b)=>b.x-a.x).indexOf(c)+1;}

function updateRace(dt){
  if(raceOver||gamePaused)return;
  // Smooth camera: lerp toward target
  const camTarget=Math.max(0,Math.min(cars[0].x-GW*0.32,TRACK-GW));
  camX+=(camTarget-camX)*Math.min(1,dt*0.008);

  for(const c of cars){
    if(c.fin)continue;
    const accel=c.vx-c.prevVx;
    c.prevVx=c.vx;
    c.vx*=0.93;c.x+=c.vx*dt*0.020;if(c.x<0)c.x=0;
    if(c.vx>1)c.wheel+=dt*0.005*c.vx;
    // Squish on boost, stretch at speed
    if(accel>5){c.sx=0.82;c.sy=1.18;} // squish on sudden accel
    else if(c.vx>25){c.sx=1.08+Math.min(c.vx,50)*0.004;c.sy=0.94;} // stretch at speed
    else{c.sx+=(1-c.sx)*0.18;c.sy+=(1-c.sy)*0.18;} // spring back
    // Vertical bounce from road
    c.bounce=Math.sin(Date.now()*0.012+c.lane*2.1)*Math.min(c.vx*0.06,2.5);
    if(!c.fin && c.x>=TRACK-60){
      if(c.player){
        // Player must answer minimum questions before finishing
          c.fin=true;
          if(!raceOver){
            raceOver=true;
            let place=1;
            for(const other of cars){if(!other.player && other.x>=c.x) place++;}
            c.place=place;
            const earnedCoins=place===1?5:place===2?2:0;
            coins+=earnedCoins;
            // ── Update lifetime stats
            totalRaces++;
            if(place===1) totalWins++;
            if(correctCount>bestScore) bestScore=correctCount;
            save();
            if(earnedCoins>0) sfxCoin();
            sfxWin();
            resultPlace=place; resultEarned=earnedCoins;
            setTimeout(()=>{ if(screen==='race') goto('result'); },850);
          }
      } else {
        c.fin=true;
      }
    }
  }
  for(let i=0;i<2;i++){
    const ai=cars[i+1];if(ai.fin)continue;
    aiTimers[i]-=dt;
    if(aiTimers[i]<=0){
      const ok=Math.random()<(difficulty==='easy'?.58:difficulty==='medium'?.65:.72);
      ai.vx=ok?Math.min(ai.vx+rn(34,44),50):Math.max(ai.vx-rn(2,5),0);
      aiTimers[i]=rn(ok?1400:700,ok?2800:1600);
    }
  }
  for(const p of particles){p.x+=p.vx*dt*.05;p.y+=p.vy*dt*.05;p.vy+=.2;p.life-=dt*.0028;}
  particles=particles.filter(p=>p.life>0);
  for(const c of cfx){c.y-=dt*.04;c.life-=dt*.004;}cfx=cfx.filter(c=>c.life>0);
  if(flashT>0)flashT-=dt;
  // race ends instantly when player crosses finish (handled above)
}

function rr(x,y,w,h,r,fill,stroke,sw=1.5){
  X.beginPath();X.moveTo(x+r,y);X.arcTo(x+w,y,x+w,y+h,r);X.arcTo(x+w,y+h,x,y+h,r);
  X.arcTo(x,y+h,x,y,r);X.arcTo(x,y,x+w,y,r);X.closePath();
  if(fill){X.fillStyle=fill;X.fill();}if(stroke){X.strokeStyle=stroke;X.lineWidth=sw;X.stroke();}
}

let btns=[];
function clearBtns(){btns=[];}
function addBtn(id,x,y,w,h,fn){btns.push({id,x,y,w,h,fn});}
function backBtn(fn){
  // Always drawn and registered last — on top of everything
  X.save();
  X.shadowColor='rgba(108,99,255,0.45)';X.shadowBlur=14;
  rr(14,GH-74,96,56,22,P.panel,P.panelBorder,2);

  txt('Back',72,GH-46,15,P.textSecondary,'center',700);
  // Register with highest priority — always last so it wins in hit testing
  addBtn('back_top',14,GH-74,96,56,fn);
}
function handleTap(gx,gy){
  // Iterate in reverse: last-registered buttons (back button, pause) win
  for(let i=btns.length-1;i>=0;i--){
    const b=btns[i];
    if(gx>=b.x&&gx<=b.x+b.w&&gy>=b.y&&gy<=b.y+b.h){sfxClick();b.fn();return;}
  }
}
// ── Unified pointer handler ──────────────────────────────────
let _tapX=0,_tapY=0,_isDragging=false;

C.addEventListener('pointerdown',e=>{
  e.preventDefault();
  const {x,y}=toG(e.clientX,e.clientY);
  _tapX=x; _tapY=y; _isDragging=false;
  garTouchStart(x,y);
},{passive:false});

C.addEventListener('pointermove',e=>{
  e.preventDefault();
  const {x,y}=toG(e.clientX,e.clientY);
  const dist=Math.sqrt((_tapX-x)**2+(_tapY-y)**2);
  if(dist>8) _isDragging=true;
  garTouchMove(x,y);
},{passive:false});

C.addEventListener('pointerup',e=>{
  e.preventDefault();
  const {x,y}=toG(e.clientX,e.clientY);
  garTouchEnd();
  if(!_isDragging){
    handleTap(_tapX,_tapY);
  }
  _isDragging=false;
},{passive:false});

C.addEventListener('pointercancel',e=>{
  garTouchEnd();_isDragging=false;
},{passive:false});

}

/* ══ RESULT ══ */
let resultT=0;
let confetti=[];
function spawnConfetti(){
  confetti=[];
  const cols=[P.gold,P.accentC,P.accent,P.accentB,P.accentD,'#00C9FF','#FF8C00','#B388FF'];
  for(let i=0;i<80;i++){
    confetti.push({
      x:rn(0,GW),y:rn(-60,-10),
      vx:(Math.random()-.5)*3,vy:rn(1,4),
      r:rn(0,360),vr:(Math.random()-.5)*8,
      w:rn(6,12),h:rn(4,8),
      color:cols[i%cols.length],life:1
    });
  }
}

function drawResult(){
  resultT+=.016;clearBtns();
  const bg=X.createLinearGradient(0,0,0,GH);
  bg.addColorStop(0,'#06060f');bg.addColorStop(1,'#0e0525');
  X.fillStyle=bg;X.fillRect(0,0,GW,GH);

  const place=resultPlace,won=place===1;

  // ── Confetti physics
  if(won){
    if(confetti.length===0&&resultT<0.1) spawnConfetti();
    for(const cf of confetti){
      cf.x+=cf.vx; cf.y+=cf.vy; cf.r+=cf.vr; cf.vy+=0.08;
      if(cf.y>GH+20){cf.y=-20;cf.x=rn(0,GW);cf.vy=rn(1,4);}
      X.save();X.translate(cf.x,cf.y);X.rotate(cf.r*Math.PI/180);
      X.globalAlpha=Math.min(cf.life,.95);
      X.fillStyle=cf.color;
      // Mix shapes: rect and circle
      if(cf.w>9){X.beginPath();X.arc(0,0,cf.w/2,0,Math.PI*2);X.fill();}
      else X.fillRect(-cf.w/2,-cf.h/2,cf.w,cf.h);
      X.restore();
    }
    X.globalAlpha=1;
    // Radial glow behind trophy
    const grd=X.createRadialGradient(GW/2,185,0,GW/2,185,90);
    grd.addColorStop(0,'rgba(255,208,77,0.18)');
    grd.addColorStop(1,'rgba(255,208,77,0)');
    X.fillStyle=grd;X.fillRect(GW/2-90,95,180,180);
  }

  // ── Trophy / medal
  const trophyY=185;
  if(won){
    // pulsing trophy with glow rings
    const ts=1+Math.sin(resultT*2.8)*.07;
    X.save();X.translate(GW/2,trophyY);
    // outer glow ring
    X.save();X.shadowColor=P.gold;X.shadowBlur=0;
    for(let ring=3;ring>=1;ring--){
      X.globalAlpha=0.08*ring;
      X.beginPath();X.arc(0,0,40+ring*12,0,Math.PI*2);
      X.fillStyle=P.gold;X.fill();
    }
    X.restore();X.globalAlpha=1;
    X.scale(ts,ts);
    X.font='90px sans-serif';X.textAlign='center';X.textBaseline='middle';
    X.shadowColor='#FFD060';X.shadowBlur=32;
    X.fillText('🏆',0,0);
    X.restore();
  }else{
    const ts=1+Math.sin(resultT*2)*.04;
    X.save();X.translate(GW/2,trophyY);X.scale(ts,ts);
    X.font='72px sans-serif';X.textAlign='center';X.textBaseline='middle';
    X.fillText(place===2?'🥈':'🥉',0,0);
    X.restore();
  }

  // ── Title
  const titles=['YOU WON!','2nd PLACE','3rd PLACE'];
  const tCols=[P.gold,'#BDC3C7','#CD7F32'];
  X.save();const ts2=won?1+Math.sin(resultT*2.5)*.035:1;
  X.translate(GW/2,282);X.scale(ts2,ts2);
  X.font='900 50px Nunito,sans-serif';X.textAlign='center';X.textBaseline='middle';
  X.fillStyle='rgba(0,0,0,0.45)';X.fillText(titles[place-1],3,5);
  X.fillStyle=tCols[place-1];X.fillText(titles[place-1],0,0);
  X.restore();

  // ── Stats row — coins + correct answers
  const earnedCoins=resultEarned;
  const statY=340;
  // coins card
  X.save();X.shadowColor='rgba(255,208,96,0.35)';X.shadowBlur=14;
  rr(36,statY,148,58,18,'rgba(255,208,96,0.12)','rgba(255,208,96,0.35)',1.5);X.restore();
  txt('Coins',110,statY+16,11,P.textMuted,'center',600);
  // animated coin count roll
  const displayCoins=won?Math.min(earnedCoins,Math.floor(resultT*10)):earnedCoins;
  X.save();X.shadowColor=P.gold;X.shadowBlur=8;
  txt(`+${displayCoins}🪙`,110,statY+38,20,P.gold,'center',900);
  X.restore();
  // correct answers card
  X.save();X.shadowColor='rgba(67,233,123,0.3)';X.shadowBlur=14;
  rr(GW-184,statY,148,58,18,'rgba(67,233,123,0.1)','rgba(67,233,123,0.3)',1.5);X.restore();
  txt('Correct',GW-110,statY+16,11,P.textMuted,'center',600);
  txt(`${correctCount}/${totalQ} ✓`,GW-110,statY+38,20,P.accentC,'center',900);

  // ── Race summary rows
  const summaryStart=418;
  const placeLabels=['🥇 1st Place','🥈 2nd Place','🥉 3rd Place'];
  // Player row
  X.save();X.shadowColor=P.accent+'44';X.shadowBlur=14;
  rr(36,summaryStart,GW-72,50,16,'rgba(108,99,255,0.18)','rgba(108,99,255,0.45)',2);X.restore();
  txt(placeLabels[place-1],GW/2,summaryStart+14,14,P.white,'center',900);
  txt(`You  •  ${cars[0].def.name}`,GW/2,summaryStart+34,12,P.textSecondary,'center',600);

  // AI cars — show their names and estimated places
  const aiCars=cars.filter(c=>!c.player).sort((a,b)=>b.x-a.x);
  const aiPlaces=aiCars.map((c,i)=>{
    let p=1;
    cars.forEach(o=>{ if(o!==c&&o.x>c.x)p++; });
    return{car:c,place:p};
  }).sort((a,b)=>a.place-b.place);

  aiPlaces.forEach((ap,i)=>{
    const ry=summaryStart+62+i*52;
    rr(36,ry,GW-72,44,14,P.panel,P.panelBorder,1);
    X.beginPath();X.arc(62,ry+22,8,0,Math.PI*2);X.fillStyle=ap.car.def.body;X.fill();
    txt(placeLabels[Math.min(ap.place-1,2)],GW/2,ry+12,12,P.textSecondary,'center',700);
    txt(`${ap.car.name}  •  ${ap.car.def.name}`,GW/2,ry+30,11,P.textMuted,'center',600);
  });

  // ── Lifetime stats strip
  const statsY=570;
  X.save();X.shadowColor='rgba(255,255,255,0.05)';X.shadowBlur=6;
  rr(36,statsY,GW-72,44,14,'rgba(255,255,255,0.04)','rgba(255,255,255,0.08)',1);X.restore();
  const col3=(GW-72)/3;
  [{label:'Races',val:totalRaces},{label:'Wins',val:totalWins},{label:'Best',val:bestScore+'✓'}]
    .forEach((s,i)=>{
      const sx=36+col3*i+col3/2;
      txt(String(s.val),sx,statsY+16,15,P.white,'center',900);
      txt(s.label,sx,statsY+32,10,P.textMuted,'center',600);
    });

  // ── Buttons
  const btnY=GH-106;
  X.save();X.shadowColor=P.accent+'66';X.shadowBlur=18;
  bigBtn(36,btnY,GW-72,60,'▶  Race Again',P.accent,'#fff',24);X.restore();
  addBtn('again',36,btnY,GW-72,60,()=>{
    placesDone=0;correctCount=0;confetti=[];
    raceOver=false; // ensure clean state before init
    initRace();goto('race');
  });

  bigBtn(36,btnY+72,GW-72,50,'Home','rgba(255,255,255,0.08)','rgba(255,255,255,0.72)',20);
  addBtn('home2',36,btnY+72,GW-72,50,()=>{stopBGM();confetti=[];goto('home');});
}

/* ══ GARAGE ══ */
let garageScroll=0, garageScrollTarget=0;
let garDragY=null, garDragStart=0, garScrollStart=0, garDragging=false;
const GARAGE_HEADER=162; // fixed header height
function garageContentH(){
  const cols=2,ch=172,gap=14,rows=Math.ceil(CAR_DEFS.length/cols);
  return GARAGE_HEADER+14+rows*(ch+gap)+80; // 80 = backbtn space
}
function garageMaxScroll(){ return Math.max(0,garageContentH()-GH); }

function drawGarage(){
  clearBtns();drawBG();

  // Smooth scroll
  garageScroll+=(garageScrollTarget-garageScroll)*0.15;
  if(Math.abs(garageScrollTarget-garageScroll)<0.5) garageScroll=garageScrollTarget;

  // ── Fixed header
  const hg=X.createLinearGradient(0,0,0,GARAGE_HEADER);
  hg.addColorStop(0,'#06060f');hg.addColorStop(1,'#0e0525');
  X.fillStyle=hg;X.fillRect(0,0,GW,GARAGE_HEADER);
  shadow('Garage',GW/2,60,34,'#fff');
  txt('Collect & unlock cars',GW/2,96,14,P.textSecondary,'center',600);
  X.save();X.shadowColor='rgba(255,208,96,0.25)';X.shadowBlur=14;
  rr(GW/2-58,112,116,32,16,'rgba(255,208,96,0.1)','rgba(255,208,96,0.28)',1.5);X.restore();
  txt(`🪙 ${coins}`,GW/2,128,15,P.gold,'center',800);

  // ── Scrollable grid (draw with clip + translate)
  const scrollTop=GARAGE_HEADER;
  X.save();
  X.beginPath();X.rect(0,scrollTop,GW,GH-scrollTop);X.clip();
  X.translate(0,-garageScroll);

  const cols=2,cw=(GW-48)/cols,ch=172,sy=scrollTop+14;
  CAR_DEFS.forEach((car,i)=>{
    const col=i%2,row=~~(i/2);
    const cx=16+col*(cw+16), cy=sy+row*(ch+14);
    const isOwned=owned.includes(i),isActive=active===i;

    X.save();X.shadowColor=isActive?car.body+'55':'transparent';X.shadowBlur=isActive?20:0;
    rr(cx,cy,cw,ch,20,isActive?car.body+'1e':P.panel,isActive?car.body:P.panelBorder,isActive?2:1);
    X.restore();
    drawCar(cx+cw/2,cy+82,car,0,.85,false);
    txt(car.name,cx+cw/2,cy+133,14,isActive?car.body:P.white,'center',isActive?900:700);
    if(!isOwned){
      rr(cx+cw/2-30,cy+150,60,22,11,'rgba(255,208,96,0.15)','rgba(255,208,96,0.35)',1);
      txt(`🪙 ${car.price}`,cx+cw/2,cy+161,12,P.gold,'center',800);
    }else if(isActive){
      pill(cx+cw/2-26,cy+150,52,20,P.accentC);
      txt('Active',cx+cw/2,cy+160,11,'#1a2e1a','center',800);
    }else{
      pill(cx+cw/2-26,cy+150,52,20,'rgba(255,255,255,0.09)');
      txt('Select',cx+cw/2,cy+160,11,P.textSecondary,'center',700);
    }

    // Hit coords = screen coords = drawn canvas pos minus scroll
    const screenCY = cy - garageScroll;
    // Reserve bottom 90px for back button — never let car cards block it
    const BACK_ZONE = GH - 90;
    if(screenCY + ch > scrollTop && screenCY < BACK_ZONE){
      // Clamp hit area so it never bleeds into back button zone
      const clampedH = Math.min(ch, BACK_ZONE - screenCY);
      if(clampedH > 20){
        addBtn(`car${i}`,cx,screenCY,cw,clampedH,()=>{
          if(isOwned){active=i;save();}
          else if(coins>=car.price){coins-=car.price;owned.push(i);active=i;save();sfxCoin();}
        });
      }
    }
  });
  X.restore();

  // Scroll bar
  const maxS=garageMaxScroll();
  if(maxS>0){
    const barH=Math.max(36,(GH-scrollTop)*((GH-scrollTop)/garageContentH()));
    const barY=scrollTop+(garageScroll/maxS)*((GH-scrollTop)-barH);
    rr(GW-8,barY,5,barH,3,'rgba(255,255,255,0.2)');
  }

  // Scroll hint if more content below
  if(garageScroll < maxS-10){
    const hy=GH-90;
    const fg=X.createLinearGradient(0,hy,0,GH-80);
    fg.addColorStop(0,'rgba(6,6,15,0)');fg.addColorStop(1,'rgba(6,6,15,0.92)');
    X.fillStyle=fg;X.fillRect(0,hy,GW,GH-80-hy);
    txt('↓ scroll',GW/2,GH-92,11,'rgba(255,255,255,0.3)','center',700);
  }

  // Bottom fade
  const fg=X.createLinearGradient(0,GH-80,0,GH);
  fg.addColorStop(0,'rgba(6,6,15,0)');fg.addColorStop(1,'rgba(6,6,15,1)');
  X.fillStyle=fg;X.fillRect(0,GH-80,GW,80);

  // Back button — ALWAYS fixed at bottom of screen, registered in screen coords
  backBtn(()=>{garageScroll=0;garageScrollTarget=0;goto('home');});
}

// ── Garage touch scroll handlers
function garTouchStart(gx,gy){
  if(screen!=='garage')return;
  garDragY=gy; garDragStart=gy; garScrollStart=garageScrollTarget; garDragging=false;
}
function garTouchMove(gx,gy){
  if(screen!=='garage'||garDragY===null)return;
  const dy=garDragY-gy;
  if(Math.abs(garDragStart-gy)>6) garDragging=true;
  if(garDragging){
    garageScrollTarget=Math.max(0,Math.min(garageMaxScroll(),garScrollStart+dy));
  }
}
function garTouchEnd(){
  garDragY=null;
}

      coins+=rewards[Math.min(dayIdx,rewards.length-1)];
      lastDay=today;dayIdx=Math.min(dayIdx+1,rewards.length-1);
      save();sfxCoin();sfxWin();

  }else{
    rr(52,536,GW-104,58,24,'rgba(255,255,255,0.04)',P.panelBorder);
    txt('Already claimed today',GW/2,565,15,P.textMuted,'center',600);

  backBtn(()=>goto('home'));

/* ══ MAIN LOOP ══ */
let last=0;
function loop(ts){
  const dt=Math.min(ts-last,50);last=ts;
  // Re-ensure smoothing every frame (some browsers reset it)
  X.imageSmoothingEnabled=true;
  X.imageSmoothingQuality='high';
  X.clearRect(0,0,C.width,C.height);
  X.fillStyle='#06060f';X.fillRect(0,0,C.width,C.height);
  X.save();
  // DPR * RSCALE * SC = full native pixel density
  X.setTransform(DPR*SC*RSCALE,0,0,DPR*SC*RSCALE,OX*DPR*RSCALE,OY*DPR*RSCALE);
  updateFade();
  switch(screen){
    case 'home':       drawHome();break;
    case 'difficulty': drawDifficulty();break;
    case 'race':       updateRace(dt);drawRace();break;
    case 'result':     drawResult();break;
    case 'garage':     drawGarage();break;
    case 'daily':      drawDaily();break;
    case 'settings':   drawSettings();break;
  }
  drawFade();
  X.restore();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{last=ts;requestAnimationFrame(loop);});
